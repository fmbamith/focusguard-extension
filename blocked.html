<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stay Focused — FocusGuard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080b12; --surface: rgba(255,255,255,0.04); --surface2: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.08); --text: #f0f2f8; --muted: rgba(240,242,248,0.45);
    --accent: #6ee7b7; --accent2: #818cf8; --danger: #f87171; --glow: rgba(110,231,183,0.15);
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }
  .bg-orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.18; animation: drift 20s ease-in-out infinite alternate; }
  .orb1 { width: 500px; height: 500px; background: #6ee7b7; top: -100px; left: -100px; animation-delay: 0s; }
  .orb2 { width: 400px; height: 400px; background: #818cf8; bottom: -80px; right: -80px; animation-delay: -7s; }
  .orb3 { width: 300px; height: 300px; background: #f59e0b; top: 40%; left: 60%; animation-delay: -12s; }
  @keyframes drift { from { transform: translate(0, 0) scale(1); } to { transform: translate(40px, 30px) scale(1.1); } }
  .noise { position: fixed; inset: 0; z-index: 0; opacity: 0.03; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E"); background-size: 200px 200px; }
  main { position: relative; z-index: 1; height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 3rem; max-width: 540px; width: 100%; text-align: center; backdrop-filter: blur(20px); box-shadow: 0 0 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06); animation: cardIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
  @keyframes cardIn { from { opacity: 0; transform: translateY(30px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .shield-icon { width: 72px; height: 72px; margin: 0 auto 1.5rem; background: linear-gradient(135deg, #6ee7b7, #818cf8); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 32px; box-shadow: 0 0 40px var(--glow); animation: pulse-glow 3s ease-in-out infinite; }
  @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 40px var(--glow); } 50% { box-shadow: 0 0 70px rgba(110,231,183,0.3), 0 0 100px rgba(129,140,248,0.15); } }
  .blocked-site { font-family: 'Syne', sans-serif; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent2); background: rgba(129,140,248,0.1); border: 1px solid rgba(129,140,248,0.2); border-radius: 100px; padding: 0.35rem 1rem; display: inline-block; margin-bottom: 1.5rem; }
  h1 { font-family: 'Syne', sans-serif; font-size: 2.2rem; font-weight: 800; line-height: 1.15; margin-bottom: 1.25rem; background: linear-gradient(135deg, #f0f2f8 0%, #9ca3af 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .quote-container { min-height: 4rem; display: flex; align-items: center; justify-content: center; margin-bottom: 2.5rem; }
  .quote { font-size: 1rem; line-height: 1.65; color: var(--muted); font-style: italic; transition: opacity 0.5s ease, transform 0.5s ease; }
  .quote.fade-out { opacity: 0; transform: translateY(-8px); }
  .divider { width: 40px; height: 2px; background: linear-gradient(90deg, transparent, var(--border), transparent); margin: 0 auto 2.5rem; }
  .stats-row { display: flex; gap: 1rem; margin-bottom: 2.5rem; }
  .stat { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 0.75rem; }
  .stat-value { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }
  .btn-group { display: flex; flex-direction: column; gap: 0.75rem; }
  .btn { width: 100%; padding: 0.9rem 2rem; border-radius: 12px; border: none; font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: all 0.2s ease; position: relative; overflow: hidden; letter-spacing: 0.02em; }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: linear-gradient(135deg, #6ee7b7, #34d399); color: #064e3b; box-shadow: 0 4px 20px rgba(110,231,183,0.3); }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(110,231,183,0.4); }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: 0.8rem; font-weight: 400; font-family: 'DM Sans', sans-serif; }
  .btn-ghost:hover { border-color: rgba(248,113,113,0.3); color: var(--danger); background: rgba(248,113,113,0.05); }
  .time-display { font-family: 'Syne', sans-serif; font-size: 0.75rem; color: var(--muted); margin-top: 1.5rem; opacity: 0.6; }
</style>
</head>
<body>
<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>
<div class="noise"></div>
<main>
  <div class="card">
    <div class="shield-icon">🛡️</div>
    <div class="blocked-site" id="site-badge">Blocked Site</div>
    <h1>Stay Focused,<br>You've Got This!</h1>
    <div class="quote-container">
      <p class="quote" id="quote-text"></p>
    </div>
    <div class="divider"></div>
    <div class="stats-row" id="stats-row" style="display:none">
      <div class="stat">
        <div class="stat-value" id="stat-blocked">0</div>
        <div class="stat-label">Blocked Today</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-streak">0</div>
        <div class="stat-label">Day Streak</div>
      </div>
    </div>
    <div class="btn-group">
      <button class="btn btn-primary" id="btn-back">← Back to Work</button>
      <button class="btn btn-ghost" id="btn-unblock">I need a break — Open Challenge</button>
    </div>
    <div class="time-display" id="time-display"></div>
  </div>
</main>
<script src="blocked.js"></script>
</body>
</html>
